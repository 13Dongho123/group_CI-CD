# OIDC: GHA → AWS AssumeRoleWithWebIdentity
# Secrets: AWS_ROLE_TO_ASSUME, CODECOMMIT_HTTPS_URL | Variables(선택): AWS_REGION
# 단계: Unit Test → Security Scan → Docker Build Test → CodeCommit mirror
name: group-ci
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: group-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Layout & Python compile
        run: |
          set -euo pipefail
          test -f buildspec.yml && test -f appspec.yml && test -f group_sender.py
          python -m compileall -q .

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bandit
        continue-on-error: true
        run: |
          pip install -q bandit
          bandit -r . -ll -x ./tests

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker engine smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          printf '%s\n' 'FROM alpine:3.19' 'RUN echo docker-build-test-ok' > "${tmp}/Dockerfile"
          docker build -f "${tmp}/Dockerfile" -t group-gha-smoke:test "${tmp}"

  mirror-to-codecommit:
    name: Mirror to CodeCommit
    needs: [unit-test, security-scan, docker-build-test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check secrets
        run: |
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" && test -n "${{ secrets.CODECOMMIT_HTTPS_URL }}"
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: gh-group-${{ github.run_id }}
          audience: sts.amazonaws.com
      - name: Verify OIDC session (get-caller-identity)
        run: aws sts get-caller-identity
      - env:
          CC_URL: ${{ secrets.CODECOMMIT_HTTPS_URL }}
        run: |
          set -euo pipefail
          git config --global credential.helper '!aws codecommit credential-helper $@'
          git config --global credential.UseHttpPath true
          git remote add codecommit "${CC_URL}" 2>/dev/null || git remote set-url codecommit "${CC_URL}"
          git push codecommit "HEAD:refs/heads/${GITHUB_REF_NAME:-main}"
